name: Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-main
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  deploy-client:
    name: Deploy client to Vercel
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client
    env:
      VERCEL_PROJECT_NAME: ${{ vars.VERCEL_PROJECT_NAME || 'skycast-client' }}
      VERCEL_SCOPE: ${{ vars.VERCEL_SCOPE }}
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint client
        run: npm run lint

      - name: Test client
        run: npm test -- --watch=false --browsers=ChromeHeadless

      - name: Build client
        run: npm run build

      - name: Deploy to Vercel
        run: |
          test -n "$VERCEL_TOKEN"

          args=(deploy . --prod --yes --token "$VERCEL_TOKEN" --project "$VERCEL_PROJECT_NAME")
          if [ -n "$VERCEL_SCOPE" ]; then
            args+=(--scope "$VERCEL_SCOPE")
          fi

          npx --yes vercel@latest "${args[@]}"

  deploy-server:
    name: Deploy server to Railway
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    env:
      RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
      RAILWAY_PROJECT_ID: ${{ vars.RAILWAY_PROJECT_ID }}
      RAILWAY_SERVICE_ID: ${{ vars.RAILWAY_SERVICE_ID }}
      RAILWAY_ENVIRONMENT: ${{ vars.RAILWAY_ENVIRONMENT || 'production' }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: server/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint server
        run: npm run lint

      - name: Test server
        run: npm test -- --runInBand

      - name: Build server
        run: npm run build

      - name: Install Railway CLI
        run: npm install --global @railway/cli

      - name: Deploy to Railway
        run: |
          test -n "$RAILWAY_TOKEN"
          test -n "$RAILWAY_PROJECT_ID"
          test -n "$RAILWAY_SERVICE_ID"

          railway up \
            --project "$RAILWAY_PROJECT_ID" \
            --service "$RAILWAY_SERVICE_ID" \
            --environment "$RAILWAY_ENVIRONMENT" \
            --ci \
            --yes \
            --message "GitHub Actions ${GITHUB_SHA}"
